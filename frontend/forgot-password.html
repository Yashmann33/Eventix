<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventura — Forgot Password</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="split-layout">
    <a href="login.html" class="btn-back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Back to Login
    </a>

    <div class="split-form">
      <div class="mb-8">
        <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem;">Reset Password</h1>
        <p style="color: var(--text-muted);">Enter your email address and we'll send you a link to reset your password.</p>
      </div>

      <div id="alertContainer"></div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
      </div>

      <button class="btn btn-primary" style="width: 100%; padding: 0.8rem; margin-top: 1rem;" id="resetBtn" onclick="requestReset()">Send Reset Link</button>

      <p class="mt-4 text-center" style="color: var(--text-muted); font-size: 0.9rem;">
        Remember your password? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign in</a>
      </p>
    </div>

    <div class="split-info">
      <h2>Don't worry, <br>it happens to the best of us</h2>
      <p>We'll help you get back into your account in no time. Just follow the link in your email to choose a new password.</p>
      <div style="margin-top: 3rem; opacity: 0.1; position: absolute; bottom: -2rem; right: -2rem;">
        <svg width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    async function requestReset() {
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('resetBtn');

      if (!email) {
        return showAlert('#alertContainer', 'Please enter your email.', 'error');
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const data = await apiFetch('/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email }),
        });

        showAlert('#alertContainer', 'Reset link sent! Please check your email.', 'success');
      } catch (err) {
        showAlert('#alertContainer', err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    }
  </script>
</body>
</html>

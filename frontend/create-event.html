<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventix — Create Event</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: var(--bg-elevated); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .create-layout{display:grid;grid-template-columns:1fr 340px;gap:2.5rem;max-width:1200px;margin:auto;padding:1.5rem 2rem; width: 100%; height: 100vh; align-items: center;}
    .form-card{background:var(--bg-card);padding:2rem 2.5rem;border-radius:24px;border:1px solid var(--border);box-shadow:var(--shadow-lg); max-height: calc(100vh - 3rem); overflow-y: auto;}
    
    /* Custom Scrollbar for form card */
    .form-card::-webkit-scrollbar { width: 6px; }
    .form-card::-webkit-scrollbar-track { background: transparent; }
    .form-card::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 10px; }
    
    .preview-card{background:var(--bg-card);border-radius:24px;border:1px solid var(--border);overflow:hidden; height:fit-content;box-shadow:var(--shadow-lg)}
    .preview-header{height:160px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:0.9rem;overflow:hidden}
    .preview-header img{width:100%;height:100%;object-fit:cover}
    
    /* Modern Form Styling */
    .form-label { font-weight: 700; color: var(--text-primary); margin-bottom: 0.4rem; display: block; font-size: 0.85rem; }
    .form-control { border-radius: 12px; border: 1px solid var(--border); padding: 0.7rem 1rem; transition: 0.2s; background: rgba(0,0,0,0.1); color: var(--text-primary); }
    .form-control:focus { border-color: var(--primary); background: rgba(0,0,0,0.2); box-shadow: 0 0 0 3px var(--primary-light); }
    
    .upload-zone{border:2px dashed var(--border);border-radius:16px;padding:1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;cursor:pointer;transition:0.2s;background:rgba(0,0,0,0.1);width:100%}
    .upload-zone:hover{border-color:var(--primary);background:rgba(0,0,0,0.2);transform:translateY(-2px)}
    .upload-zone svg{transition:0.3s; stroke: var(--primary); }
    .upload-zone.has-file{border-color:var(--primary);background:rgba(0,0,0,0.2);border-style:solid}
    
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
    textarea.form-control{resize:none;min-height:100px}
    
    .btn-back-floater { position: fixed; top: 2rem; left: 2rem; z-index: 100; }
  </style>
</head>
<body>
  <div class="btn-back-floater">
    <a href="dashboard.html" class="btn btn-outline" style="background:var(--bg-card); border-radius:50px; padding:0.6rem 1.2rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      <span style="font-weight:800; color:var(--text-primary); margin-left:0.5rem">Back to Dashboard</span>
    </a>
  </div>

  <div class="create-layout">
    <div class="form-card">
      <div style="margin-bottom:1.5rem">
        <span style="display:inline-block;padding:0.3rem 0.8rem;background:var(--primary-light);color:var(--primary);border-radius:50px;font-weight:800;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem">Organizer Portal</span>
        <h1 style="font-size:2rem;letter-spacing:-0.05em; color: var(--text-primary);">Publish <span style="color:var(--primary)">Event</span></h1>
      </div>
      
      <div id="alertContainer"></div>
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Event Title</label>
          <input type="text" id="title" class="form-control" placeholder="e.g. Grand Music Festival" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="category" class="form-control" onchange="updatePreview()">
            <option value="">Select Category</option>
            <option>Music</option><option>Sports</option><option>Tech</option><option>Art</option><option>Food</option><option>Business</option><option>Education</option><option>Health</option><option>Other</option>
          </select>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="description" class="form-control" placeholder="What's the event about? Tell your audience everything..." oninput="updatePreview()"></textarea>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Location / Venue</label>
          <input type="text" id="location" class="form-control" placeholder="e.g. Madison Square Garden, NY" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label class="form-label">Event Date</label>
          <input type="date" id="date" class="form-control" onchange="updatePreview()">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Theme / Keywords</label>
        <input type="text" id="theme" class="form-control" placeholder="e.g. Festival, Summer, Outdoor, Vibes">
      </div>
      
      <div class="form-group">
        <label class="form-label">Event Thumbnail</label>
        <label for="image" class="upload-zone" id="uploadZone">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <div style="text-align:center">
            <p id="uploadText" style="margin:0;font-weight:800;color:var(--text-primary);font-size:1rem">Click to upload banner</p>
            <p style="margin:0.4rem 0 0; color:var(--text-muted); font-size:0.8rem">Best at 16:9 aspect ratio (Max. 5MB)</p>
          </div>
        </label>
        <input type="file" id="image" hidden accept="image/*" onchange="handleImg(this)">
      </div>
      
      <div style="margin-top:1.5rem;display:flex;gap:1.5rem">
        <button class="btn btn-primary" style="flex:1.5; padding:1rem; font-size: 0.95rem; border-radius: 12px; box-shadow: 0 8px 20px var(--primary-glow);" id="submitBtn">Publish Event</button>
        <a href="dashboard.html" class="btn btn-outline" style="flex:1; padding:1rem; border-radius: 12px;">Cancel</a>
      </div>
    </div>

    <div>
      <p style="font-weight:900;font-size:0.75rem;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.12em;margin-bottom:1rem">Live Preview</p>
      <div class="preview-card">
        <div class="preview-header" id="pvImg"><span>Banner preview will appear here</span></div>
        <div style="padding:2rem">
          <span id="pvCat" style="font-size:0.7rem;font-weight:900;color:var(--primary);text-transform:uppercase; letter-spacing: 0.05em;">Category</span>
          <h3 id="pvTitle" style="margin:0.5rem 0 0.75rem;font-size:1.4rem; letter-spacing: -0.02em;">Event Title</h3>
          <p id="pvDesc" style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:1.5rem; line-height: 1.5;">Your event description will appear here as you type...</p>
          <div style="font-size:0.85rem;color:var(--text-muted);border-top:1.5px solid #f6f1ee;padding-top:1.25rem; display:flex; flex-direction:column; gap:0.5rem">
            <div style="display:flex; align-items:center; gap:0.5rem">📍 <span id="pvLoc">Location</span></div>
            <div style="display:flex; align-items:center; gap:0.5rem">📅 <span id="pvDate">Date</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async ()=>{
      if(!Auth.isLoggedIn())return window.location.href='login.html';
      const u=Auth.getUser();if(u.role!=='proposer'&&u.role!=='admin'){alert('Organizers only.');return window.location.href='dashboard.html'}
      document.getElementById('submitBtn').addEventListener('click',publishEvent);
      
      const params = new URLSearchParams(window.location.search);
      const editId = params.get('edit');
      if (editId) {
          document.querySelector('h1').innerHTML = 'Edit <span style="color:var(--primary)">Event</span>';
          document.getElementById('submitBtn').textContent = 'Update Event';
          try {
              const events = await apiFetch('/events');
              const ev = events.find(e => e._id === editId);
              if (ev) {
                  document.getElementById('title').value = ev.title;
                  document.getElementById('category').value = ev.category;
                  document.getElementById('description').value = ev.description;
                  document.getElementById('location').value = ev.location;
                  document.getElementById('date').value = ev.date ? ev.date.substring(0,10) : '';
                  document.getElementById('theme').value = ev.theme;
                  if (ev.image) document.getElementById('pvImg').innerHTML = `<img src="${ev.image}">`;
                  updatePreview();
              }
          } catch(e) {}
      }
    });
    function updatePreview(){
      document.getElementById('pvTitle').textContent=document.getElementById('title').value||'Event Title';
      document.getElementById('pvDesc').textContent=(document.getElementById('description').value||'Your event description will appear here...').substring(0,140);
      document.getElementById('pvLoc').textContent=document.getElementById('location').value||'Location';
      const d=document.getElementById('date').value;document.getElementById('pvDate').textContent=d?formatDate(d):'Date';
      document.getElementById('pvCat').textContent=document.getElementById('category').value||'Category';
    }
    function handleImg(i){const f=i.files[0];if(!f)return;document.getElementById('uploadZone').classList.add('has-file');document.getElementById('uploadText').textContent=f.name;const r=new FileReader();r.onload=e=>{document.getElementById('pvImg').innerHTML='<img src="'+e.target.result+'">'};r.readAsDataURL(f)}
    async function publishEvent(){
      const title=document.getElementById('title').value.trim(),desc=document.getElementById('description').value.trim(),cat=document.getElementById('category').value,theme=document.getElementById('theme').value.trim(),loc=document.getElementById('location').value.trim(),dt=document.getElementById('date').value,img=document.getElementById('image').files[0],btn=document.getElementById('submitBtn');
      if(!title||!desc||!cat||!theme||!loc||!dt)return showAlert('#alertContainer','Please fill all fields.','error');
      
      const params = new URLSearchParams(window.location.search);
      const editId = params.get('edit');
      
      btn.disabled=true;btn.textContent=editId ? 'Updating...' : 'Publishing...';
      try{
        const fd=new FormData();fd.append('title',title);fd.append('description',desc);fd.append('category',cat);fd.append('theme',theme);fd.append('location',loc);fd.append('date',dt);if(img)fd.append('image',img);
        
        if (editId) {
            await apiFetch('/events/' + editId, {method:'PUT',body:fd});
            showAlert('#alertContainer','Event updated! Redirecting...','success');
        } else {
            await apiFetch('/events',{method:'POST',body:fd});
            showAlert('#alertContainer','Published! Redirecting...','success');
        }
        setTimeout(()=>{window.location.href='dashboard.html'},1500);
      }catch(e){showAlert('#alertContainer',e.message,'error');btn.disabled=false;btn.textContent=editId ? 'Update Event' : 'Publish Event Now'}
    }
  </script>
</body>
</html>

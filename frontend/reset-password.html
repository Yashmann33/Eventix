<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventix — Reset Password</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="split-layout">
    <div class="split-form">
      <div class="mb-8">
        <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem;">New Password</h1>
        <p style="color: var(--text-muted);">Please enter your new password below.</p>
      </div>

      <div id="alertContainer"></div>

      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
      </div>

      <button class="btn btn-primary" style="width: 100%; padding: 0.8rem; margin-top: 1rem;" id="updateBtn" onclick="updatePassword()">Update Password</button>
    </div>

    <div class="split-info">
      <h2>Security first</h2>
      <p>Choose a strong password that you haven't used elsewhere. A good password is a mix of letters, numbers, and symbols.</p>
      <div style="margin-top: 3rem; opacity: 0.1; position: absolute; bottom: -2rem; right: -2rem;">
        <svg width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        showAlert('#alertContainer', 'Invalid or missing reset token.', 'error');
        document.getElementById('updateBtn').disabled = true;
    }

    async function updatePassword() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('updateBtn');

      if (!password || password.length < 6) {
        return showAlert('#alertContainer', 'Password must be at least 6 characters.', 'error');
      }

      if (password !== confirmPassword) {
        return showAlert('#alertContainer', 'Passwords do not match.', 'error');
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        await apiFetch('/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, password }),
        });

        showAlert('#alertContainer', 'Password updated! Redirecting to login...', 'success');
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 1500);
      } catch (err) {
        showAlert('#alertContainer', err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }
  </script>
</body>
</html>
